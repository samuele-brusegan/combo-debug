# =============================================================================
# Configurazione Nginx per Combo-Debug.
#
#   * Serve il frontend statico dalla root del sito.
#   * Inoltra (reverse proxy) tutte le chiamate /api/ e /healthz verso il
#     backend FastAPI.
#
# Il backend `ros-backend` gira con `network_mode: host` (necessario alla
# discovery DDS verso un ROS 2 reale, vedi docker-compose.yml), quindi non e'
# raggiungibile tramite il nome di servizio sulla rete bridge: lo si raggiunge
# sull'host tramite `host.docker.internal` (mappato via extra_hosts/host-gateway).
# =============================================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-like: ricade su index.html per percorsi non trovati.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy delle API REST verso il backend.
    location /api/ {
        proxy_pass http://host.docker.internal:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Le misure di frequenza (ros2 topic hz) possono richiedere alcuni secondi.
        proxy_read_timeout 30s;
    }

    # Liveness probe del backend.
    location /healthz {
        proxy_pass http://host.docker.internal:8000/healthz;
    }
}
