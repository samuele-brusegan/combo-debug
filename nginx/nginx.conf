# =============================================================================
# Configurazione Nginx per Combo-Debug.
#
#   * Serve il frontend statico dalla root del sito.
#   * Inoltra (reverse proxy) tutte le chiamate /api/ e /healthz verso il
#     backend FastAPI nel container `ros-backend` (rete docker interna).
# =============================================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-like: ricade su index.html per percorsi non trovati.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy delle API REST verso il backend.
    location /api/ {
        proxy_pass http://ros-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Le misure di frequenza (ros2 topic hz) possono richiedere alcuni secondi.
        proxy_read_timeout 30s;
    }

    # Liveness probe del backend.
    location /healthz {
        proxy_pass http://ros-backend:8000/healthz;
    }
}
