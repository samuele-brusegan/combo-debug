# =============================================================================
# Combo-Debug - Orchestrazione dei container
# =============================================================================
# L'applicazione e' composta da due container, come da architettura richiesta:
#
#   * ros-backend : immagine basata su ROS 2 Humble. Contiene sia i nodi ROS 2
#                   di esempio sia il backend Python/FastAPI che li ispeziona
#                   tramite SysCall (ros2 CLI). E' il "cuore" diagnostico.
#
#   * nginx       : reverse-proxy + web server statico. Serve il frontend
#                   Vanilla JS/HTML/CSS e inoltra le chiamate /api verso il
#                   backend FastAPI.
#
# Il backend deve risiedere nello stesso container dei nodi ROS per condividere
# il grafo ROS 2 (stesso ROS_DOMAIN_ID / stesso ambiente DDS) ed avere accesso
# diretto ai comandi `ros2 ...` e alla cartella dei log (~/.ros/log).
#
# Rete: il servizio `ros-backend` usa `network_mode: host`. Questo e' cio' che
# permette al "Collega a ROS reale" di funzionare SENZA che l'utente debba
# modificare questo file: la discovery DDS di ROS 2 avviene via multicast UDP,
# che la rete bridge di Docker NON inoltra. Condividendo lo stack di rete
# dell'host, il backend vede da subito lo stesso grafo ROS 2 visibile dall'host
# (robot reale o nodi locali) oltre a continuare a vedere i nodi demo interni.
# Nginx resta su rete bridge e raggiunge il backend tramite l'host-gateway.
# =============================================================================

services:
  ros-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: combo-debug-ros-backend
    # Condivide lo stack di rete dell'host: indispensabile per la discovery DDS
    # verso un ROS 2 reale (multicast). Con host network il backend ascolta
    # direttamente su localhost:8000 dell'host (niente `expose`/`networks`).
    network_mode: host
    # Condivide /dev/shm con l'host. FastDDS usa di default il transport a
    # memoria condivisa (SHM) tra partecipanti sullo stesso host: senza un
    # /dev/shm comune, il backend NON vedrebbe i nodi ROS reali in esecuzione
    # sull'host (o in altri container), pur essendo sulla stessa rete. Con
    # `ipc: host` la discovery e lo scambio dati con il ROS reale funzionano
    # subito, sempre senza modifiche manuali a questo file.
    ipc: host
    environment:
      # Dominio DDS condiviso da backend e nodi (demo o robot reale).
      # Allinealo al ROS_DOMAIN_ID del robot, oppure cambialo a caldo dalla UI.
      ROS_DOMAIN_ID: "1"
      # Implementazione RMW di default per Humble.
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      # Avvia automaticamente i nodi demo all'avvio del container.
      # Imposta "0" per osservare SOLO il ROS reale (vedi docs/ros/real-ros.md).
      COMBO_DEBUG_START_DEMO: "1"
    # I log ROS vengono scritti in /root/.ros/log dentro il container.
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: combo-debug-nginx
    depends_on:
      - ros-backend
    ports:
      - "8090:80"
    # Permette a nginx (su rete bridge) di raggiungere il backend in ascolto
    # sull'host tramite il nome speciale `host.docker.internal`.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
